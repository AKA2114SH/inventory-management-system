services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/inventory_db
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production-12345}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_NAME: Inventory Billing System
      APP_VERSION: 1.0.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://127.0.0.1:8000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    networks:
      - inventory_network
    restart: unless-stopped
    command: >
      sh -c "sleep 5 &&
             python -c \"from sqlalchemy import create_engine; from app.core.database import Base; from app.models import Category, Product, Transaction; engine = create_engine('postgresql://postgres:password@db:5432/inventory_db'); Base.metadata.create_all(bind=engine); print('Database initialized')\" &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - inventory_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  inventory_network:
    driver: bridge